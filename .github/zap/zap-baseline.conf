# ZAP baseline rule overrides
# Rule ID, severity (WARN|IGNORE|FAIL|INFO), optional description
# IGNORE = acceptable for this app, no action needed

# Static assets (CSS, JS) are cacheable by design
10049	IGNORE	(Storable and Cacheable Content)

# Informational: modern SPA detection
10109	IGNORE	(Modern Web Application)

# COEP/COOP/CORP only needed for SharedArrayBuffer/cross-origin isolation
90004	IGNORE	(Cross-Origin-Embedder-Policy Header Missing or Invalid)

# CSP: React/Vite requires unsafe-inline and unsafe-eval; nonce-based CSP is future work
10055	IGNORE	(CSP: Wildcard Directive / unsafe-inline / unsafe-eval)

# Validation errors intentionally return user-facing messages; no stack traces in 500s
90022	IGNORE	(Application Error Disclosure)
10023	IGNORE	(Information Disclosure - Debug Error Messages)
